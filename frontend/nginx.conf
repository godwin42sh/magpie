# nginx config for the crawl frontend.
#
# - Serves the Vite-built SPA from /usr/share/nginx/html.
# - Any unknown path falls back to index.html so client-side React Router
#   handles deep links (e.g. /sites/new, /sites/:id) on a hard refresh.
# - /api is reverse-proxied to the backend NestJS container on port 3000,
#   mirroring the Vite dev-server proxy so the frontend code is identical in
#   dev and prod (it always calls a same-origin /api).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy → backend service on the shared compose network.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Zone-render + check-now can take a while (Playwright / FlareSolverr).
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback: serve the requested file if it exists, else index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
