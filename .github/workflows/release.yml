name: release

# Builds the three custom Magpie images and pushes them to GitHub Container
# Registry (ghcr.io/<owner>/magpie-{backend,frontend,camoufox}) so they can be
# pulled by a TrueNAS SCALE Custom App (and anywhere else).
#
# Triggers:
#   - pushing a tag like v1.2.3  -> images tagged 1.2.3, 1.2, and latest
#   - manual run (workflow_dispatch) -> images tagged 'latest'
#
# flaresolverr is a public upstream image and is not built here.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backend + frontend build from the repo root (they need the pnpm
          # workspace). Multi-arch so the images also run on arm64 hosts.
          - image: magpie-backend
            context: .
            dockerfile: backend/Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: magpie-frontend
            context: .
            dockerfile: frontend/Dockerfile
            platforms: linux/amd64,linux/arm64
          # Camoufox downloads a ~300 MB patched Firefox at build time; building
          # arm64 under QEMU is very slow, and TrueNAS SCALE is amd64-only, so
          # this image is amd64-only. Add arm64 here if you need it elsewhere.
          - image: magpie-camoufox
            context: ./camoufox
            dockerfile: ./camoufox/Dockerfile
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
